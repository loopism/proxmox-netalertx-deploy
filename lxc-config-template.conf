# NetAlertX LXC Container Configuration Template
# This file contains predefined configurations for different deployment scenarios

[development]
# Development configuration - minimal resources
memory = 2048
cores = 2
disk = 20
swap = 512
features = nesting=1,keyctl=1
startup = order=3
onboot = 1
ostype = ubuntu
unprivileged = 1
net0 = name=eth0,bridge=vmbr0,firewall=1,ip=dhcp
mp0 = /opt/netalertx,mp=/opt/netalertx

[production]
# Production configuration - enhanced resources and security
memory = 4096
cores = 4
disk = 40
swap = 1024
features = nesting=1,keyctl=1
startup = order=3
onboot = 1
ostype = ubuntu
unprivileged = 1
net0 = name=eth0,bridge=vmbr0,firewall=1,ip=dhcp
mp0 = /opt/netalertx,mp=/opt/netalertx
# Additional security configurations
protection = 1
# Backup configuration
backup = 1

[minimal]
# Minimal configuration for testing
memory = 1024
cores = 1
disk = 10
features = nesting=1
startup = order=5
onboot = 0
ostype = ubuntu
unprivileged = 1
net0 = name=eth0,bridge=vmbr0,ip=dhcp

[high-performance]
# High-performance configuration for large networks
memory = 8192
cores = 8
disk = 80
swap = 2048
features = nesting=1,keyctl=1
startup = order=2
onboot = 1
ostype = ubuntu
unprivileged = 1
net0 = name=eth0,bridge=vmbr0,firewall=1,ip=dhcp
mp0 = /opt/netalertx,mp=/opt/netalertx
protection = 1
backup = 1

# Network Bridge Options
# Common bridge configurations for different network setups

[network-bridges]
# Default bridge (usually management network)
vmbr0 = "Default management network"
# VLAN bridges
vmbr1 = "Internal LAN network"
vmbr2 = "DMZ network"
vmbr3 = "Guest network"

# Ubuntu Template Versions
[ubuntu-templates]
ubuntu22 = "ubuntu-22.04-standard_22.04-1_amd64.tar.zst"
ubuntu24 = "ubuntu-24.04-standard_24.04-1_amd64.tar.zst"

# Storage Options
[storage-recommendations]
local = "Local storage (not recommended for production)"
local-lvm = "LVM storage (recommended for most cases)"
shared-storage = "Shared storage like NFS/CEPH (recommended for clusters)"

# Environment Variables for NetAlertX
[netalertx-environment]
# Basic environment variables
PUID = 1000
PGID = 1000
TZ = "UTC"  # Change to your timezone
PORT = 20211
LISTEN_ADDR = "0.0.0.0"

# Advanced settings (optional)
GRAPHQL_PORT = 20212
SCAN_SUBNETS = "['192.168.1.0/24']"  # Configure for your network
LOADED_PLUGINS = "['ARPSCAN','PIHOLE']"

# Production-specific environment variables
[production-environment]
PUID = 1000
PGID = 1000
TZ = "UTC"
PORT = 20211
LISTEN_ADDR = "127.0.0.1"  # More restrictive for production
GRAPHQL_PORT = 20212

# Docker Compose Service Variants
[docker-services]
# Basic service with minimal configuration
basic = '''
version: '3.8'
services:
  netalertx:
    image: ghcr.io/jokob-sk/netalertx:latest
    container_name: netalertx
    network_mode: host
    restart: unless-stopped
    volumes:
      - ./config:/app/config
      - ./db:/app/db
    tmpfs:
      - /app/api:size=100M
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=UTC
      - PORT=20211
    cap_add:
      - NET_ADMIN
      - NET_RAW
'''

# Production service with enhanced logging and monitoring
production = '''
version: '3.8'
services:
  netalertx:
    image: ghcr.io/jokob-sk/netalertx:latest
    container_name: netalertx
    network_mode: host
    restart: unless-stopped
    volumes:
      - ./config:/app/config
      - ./db:/app/db
      - ./logs:/app/log
    tmpfs:
      - /app/api:size=200M
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=UTC
      - PORT=20211
      - LISTEN_ADDR=0.0.0.0
      - GRAPHQL_PORT=20212
    cap_add:
      - NET_ADMIN
      - NET_RAW
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:20211"]
      interval: 30s
      timeout: 10s
      retries: 3
'''

# Security Recommendations
[security-notes]
firewall = "Enable UFW firewall and only allow necessary ports"
fail2ban = "Install fail2ban for intrusion prevention"
updates = "Enable automatic security updates"
backup = "Regular backup of config and database directories"
monitoring = "Monitor container resource usage and logs"
ssl = "Consider SSL termination via reverse proxy"
